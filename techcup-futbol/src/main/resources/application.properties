spring.application.name=techcup-futbol
server.port=${PORT:8080}
# Base logging (shared by all environments)
logging.file.name=logs/techcup-futbol.log
logging.level.root=INFO
logging.level.edu.eci.dosw.techcup_futbol=INFO

# MongoDB (default/shared)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/techcup_futbol}

# H2 in-memory database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:techcupdb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

logging.file.name=logs/techcup-futbol.log
logging.level.root=INFO
logging.level.edu.eci.dosw.techcup_futbol=DEBUG

