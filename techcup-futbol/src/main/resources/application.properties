spring.application.name=techcup-futbol
# Base logging (shared by all environments)
logging.file.name=logs/techcup-futbol.log
logging.level.root=INFO
logging.level.edu.eci.dosw.techcup_futbol=INFO

# MongoDB (default/shared)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/techcup_futbol}

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:techcupdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

logging.file.name=logs/techcup-futbol.log
logging.level.root=INFO
logging.level.edu.eci.dosw.techcup_futbol=DEBUG

#security
spring.security.user.name=rol
spring.security.user.password=007