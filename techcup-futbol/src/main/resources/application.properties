spring.application.name=techcup-futbol
# Base logging (shared by all environments)
logging.file.name=logs/techcup-futbol.log
logging.level.root=INFO
logging.level.edu.eci.dosw.techcup_futbol=INFO

# MongoDB (default/shared)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/techcup_futbol}

#PostgreSQL
spring.application.name=techcup-futbol

spring.datasource.url=jdbc:postgresql://localhost:5432/techcupdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.file.name=logs/techcup-futbol.log
logging.level.root=INFO
logging.level.edu.eci.dosw.techcup_futbol=DEBUG