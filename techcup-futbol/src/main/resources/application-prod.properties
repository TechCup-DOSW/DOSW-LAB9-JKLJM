# Production logging profile
logging.level.root=INFO
logging.level.edu.eci.dosw.techcup_futbol=INFO
spring.data.mongodb.uri=${MONGODB_URI_PROD:${MONGODB_URI:mongodb://localhost:27017/techcup_futbol_prod}}

# Azure SQL Database (JPA)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://YOUR_SERVER.database.windows.net:1433;database=TechCup;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:YOUR_USER@YOUR_SERVER}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:YOUR_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
